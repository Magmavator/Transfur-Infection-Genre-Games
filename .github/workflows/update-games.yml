name: Update Game Data

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]
    paths:
      - 'games.json'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install node-fetch@2
      
      - name: Create fresh fetch script
        run: |
          cat > fetch-games.js << 'ENDOFSCRIPT'
          const fs = require('fs');
          const fetch = require('node-fetch');
          
          // Load existing data if available
          let existingData = { games: [] };
          try {
            if (fs.existsSync('games-data.json')) {
              existingData = JSON.parse(fs.readFileSync('games-data.json', 'utf8'));
              console.log('📂 Loaded existing games-data.json for downtime tracking');
            } else {
              console.log('📝 No existing games-data.json found, starting fresh');
            }
          } catch (err) {
            console.log('⚠️ Error reading existing data, starting fresh:', err.message);
          }
          
          // Helper to find existing game data
          function findExistingGame(placeId) {
            if (!existingData.games) return null;
            for (const game of existingData.games) {
              if (game.placeId === placeId) return game;
              if (game.subgames) {
                for (const sub of game.subgames) {
                  if (sub.placeId === placeId) return sub;
                }
              }
            }
            return null;
          }
          
          // Helper to update downtime periods
          function updateDowntime(existingGame, isAvailable) {
            const now = new Date().toISOString();
            const today = now.split('T')[0];
            
            let downtimePeriods = [];
            if (existingGame && existingGame.downtimePeriods) {
              downtimePeriods = [...existingGame.downtimePeriods];
            }
            
            const isFirstRun = !existingGame;
            
            if (!isAvailable) {
              const lastPeriod = downtimePeriods[downtimePeriods.length - 1];
              
              if (!lastPeriod || lastPeriod.end !== null) {
                const startDate = isFirstRun ? null : today;
                
                downtimePeriods.push({
                  start: startDate,
                  end: null
                });
                
                if (isFirstRun) {
                  console.log(`    📉 Started new downtime period with unknown start (first run)`);
                } else {
                  console.log(`    📉 Started new downtime period: ${today}`);
                }
              }
            } else {
              const lastPeriod = downtimePeriods[downtimePeriods.length - 1];
              if (lastPeriod && lastPeriod.end === null) {
                lastPeriod.end = today;
                console.log(`    📈 Closed downtime period: ${lastPeriod.start || 'unknown'} to ${today}`);
              }
            }
            
            return downtimePeriods;
          }
          
          // Helper function to fetch game data by placeId
          async function fetchGameData(placeId, gameLink, existingGame) {
            try {
              const universeUrl = `https://apis.roblox.com/universes/v1/places/${placeId}/universe`;
              const universeRes = await fetch(universeUrl);
              const universeData = await universeRes.json();
              
              if (!universeData.universeId) {
                throw new Error('No universeId in response');
              }
              const universeId = universeData.universeId;
              
              const detailsUrl = `https://games.roblox.com/v1/games?universeIds=${universeId}`;
              const detailsRes = await fetch(detailsUrl);
              const detailsData = await detailsRes.json();
              
              if (!detailsData.data || !detailsData.data[0]) {
                throw new Error('No game details in response');
              }
              const details = detailsData.data[0];
              
              const iconUrl = `https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=256x256&format=Png&isCircular=false`;
              const iconRes = await fetch(iconUrl);
              const iconData = await iconRes.json();
              const icon = iconData.data?.[0]?.imageUrl || '';
              
              const thumbUrl = `https://thumbnails.roblox.com/v1/games/multiget/thumbnails?universeIds=${universeId}&countPerUniverse=8&size=768x432&format=Png&isCircular=false`;
              const thumbRes = await fetch(thumbUrl);
              const thumbData = await thumbRes.json();
              
              let thumbnails = [];
              if (thumbData.data && thumbData.data[0] && thumbData.data[0].thumbnails) {
                thumbnails = thumbData.data[0].thumbnails.map(t => t.imageUrl);
              }
              
              const downtimePeriods = updateDowntime(existingGame, true);
              
              return {
                universeId: universeId,
                name: details.name,
                playerCount: details.playing,
                created: details.created,
                updated: details.updated,
                ownerName: details.creator.name,
                ownerUrl: details.creator.type === 'Group' 
                  ? `https://www.roblox.com/groups/${details.creator.id}`
                  : `https://www.roblox.com/users/${details.creator.id}/profile`,
                thumbnailUrl: icon,
                thumbnails: thumbnails,
                gameUrl: `https://www.roblox.com/games/${placeId}`,
                downtimePeriods: downtimePeriods,
                currentlyAvailable: true
              };
            } catch (err) {
              console.error(`    ❌ Fetch failed: ${err.message}`);
              
              const downtimePeriods = updateDowntime(existingGame, false);
              
              return {
                name: 'Failed to load',
                playerCount: '?',
                created: '?',
                updated: '?',
                ownerName: '?',
                thumbnailUrl: '',
                thumbnails: [],
                gameUrl: gameLink || '#',
                downtimePeriods: downtimePeriods,
                currentlyAvailable: false,
                lastError: err.message
              };
            }
          }

          async function main() {
            console.log('📂 Reading games.json...');
            
            if (!fs.existsSync('games.json')) {
              throw new Error('games.json not found!');
            }
            
            const gamesData = JSON.parse(fs.readFileSync('games.json', 'utf8'));
            
            if (!gamesData.games || !Array.isArray(gamesData.games)) {
              throw new Error('games.json must have a "games" array');
            }
            
            console.log(`📦 Found ${gamesData.games.length} games to process`);
            
            const enrichedGames = [];
            
            for (let i = 0; i < gamesData.games.length; i++) {
              const game = gamesData.games[i];
              console.log(`\n[${i + 1}/${gamesData.games.length}] Processing: ${game.gameLink || game.placeId}`);
              
              try {
                const existingMain = findExistingGame(game.placeId);
                
                const mainGameData = await fetchGameData(game.placeId, game.gameLink, existingMain);
                
                let processedSubgames = [];
                if (game.subgames && game.subgames.length > 0) {
                  console.log(`  🔍 Processing ${game.subgames.length} subgames...`);
                  
                  for (let j = 0; j < game.subgames.length; j++) {
                    const sub = game.subgames[j];
                    console.log(`    📦 Subgame ${j + 1}/${game.subgames.length}: ${sub.gameLink || sub.placeId}`);
                    
                    const existingSub = existingMain?.subgames?.find(s => s.placeId === sub.placeId);
                    
                    const subGameData = await fetchGameData(sub.placeId, sub.gameLink, existingSub);
                    
                    processedSubgames.push({
                      placeId: sub.placeId,
                      gameLink: sub.gameLink,
                      note: sub.note || null,
                      ...subGameData
                    });
                    
                    if (j < game.subgames.length - 1) {
                      await new Promise(resolve => setTimeout(resolve, 500));
                    }
                  }
                  
                  console.log(`  ✅ Processed ${processedSubgames.length} subgames`);
                }
                
                enrichedGames.push({
                  placeId: game.placeId,
                  gameLink: game.gameLink || null,
                  ...mainGameData,
                  subgames: processedSubgames
                });
                
                console.log(`  ✅ Game ${i + 1} complete with ${processedSubgames.length} subgames`);
                
              } catch (err) {
                console.error(`  ❌ Main game failed: ${err.message}`);
                
                const existingMain = findExistingGame(game.placeId);
                const downtimePeriods = updateDowntime(existingMain, false);
                
                let processedSubgames = [];
                if (game.subgames && game.subgames.length > 0) {
                  console.log(`  🔍 Processing ${game.subgames.length} subgames (main game failed)...`);
                  
                  for (let j = 0; j < game.subgames.length; j++) {
                    const sub = game.subgames[j];
                    
                    try {
                      const existingSub = existingMain?.subgames?.find(s => s.placeId === sub.placeId);
                      const subGameData = await fetchGameData(sub.placeId, sub.gameLink, existingSub);
                      
                      processedSubgames.push({
                        placeId: sub.placeId,
                        gameLink: sub.gameLink,
                        note: sub.note || null,
                        ...subGameData
                      });
                    } catch (subErr) {
                      console.error(`    ❌ Subgame failed: ${subErr.message}`);
                      processedSubgames.push({
                        placeId: sub.placeId,
                        gameLink: sub.gameLink,
                        note: sub.note || null,
                        name: 'Failed to load',
                        playerCount: '?',
                        currentlyAvailable: false,
                        lastError: subErr.message,
                        downtimePeriods: updateDowntime(null, false)
                      });
                    }
                    
                    if (j < game.subgames.length - 1) {
                      await new Promise(resolve => setTimeout(resolve, 500));
                    }
                  }
                }
                
                enrichedGames.push({
                  placeId: game.placeId,
                  gameLink: game.gameLink || null,
                  name: 'Failed to load',
                  playerCount: '?',
                  created: '?',
                  updated: '?',
                  ownerName: '?',
                  thumbnailUrl: '',
                  thumbnails: [],
                  gameUrl: game.gameLink || '#',
                  subgames: processedSubgames,
                  downtimePeriods: downtimePeriods,
                  currentlyAvailable: false,
                  lastError: err.message
                });
              }
              
              if (i < gamesData.games.length - 1) {
                console.log('  ⏱️ Waiting 1 second...');
                await new Promise(resolve => setTimeout(resolve, 1000));
              }
            }
            
            const output = {
              lastUpdated: new Date().toISOString().split('T')[0],
              lastUpdatedFull: new Date().toISOString(),
              games: enrichedGames
            };
            
            console.log('\n📝 Writing games-data.json...');
            fs.writeFileSync('games-data.json', JSON.stringify(output, null, 2));
            
            const stats = fs.statSync('games-data.json');
            console.log(`✅ File created: ${stats.size} bytes`);
            console.log(`✅ Contains ${enrichedGames.length} games`);
            
            let totalSubgames = enrichedGames.reduce((acc, game) => acc + (game.subgames?.length || 0), 0);
            console.log(`✅ Total subgames processed: ${totalSubgames}`);
            
            console.log('\n📊 Downtime summary:');
            enrichedGames.forEach(game => {
              if (game.downtimePeriods?.length > 0) {
                console.log(`  ${game.name}: ${game.downtimePeriods.length} downtime periods`);
              }
              if (game.subgames) {
                game.subgames.forEach(sub => {
                  if (sub.downtimePeriods?.length > 0) {
                    console.log(`    ${sub.name}: ${sub.downtimePeriods.length} downtime periods`);
                  }
                });
              }
            });
          }
          
          main().catch(err => {
            console.error('❌ Fatal error:', err);
            process.exit(1);
          });
          ENDOFSCRIPT
      
      - name: Run fetch script
        run: node fetch-games.js
      
      - name: Verify file was created
        run: |
          if [ -f games-data.json ]; then
            echo "✅ games-data.json exists"
            ls -la games-data.json
            echo ""
            echo "📄 Preview (first 20 lines):"
            head -20 games-data.json
          else
            echo "❌ games-data.json was not created!"
            exit 1
          fi
      
      - name: Validate JSON
        run: |
          echo "🔍 Validating JSON..."
          node -e "JSON.parse(require('fs').readFileSync('games-data.json', 'utf8')); console.log('✅ JSON is valid!')"
      
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add games-data.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update game data [skip ci]"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
            echo "✅ Changes pushed"
          fi
