name: Update Game Data

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]
    paths:
      - 'games.json'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install node-fetch@2
      
      - name: Create fetch script
        run: |
          cat > fetch-games.js << 'EOF'
          const fs = require('fs');
          const fetch = require('node-fetch');
          
          const gamesData = JSON.parse(fs.readFileSync('games.json', 'utf8'));
          
          async function fetchUniverseId(placeId) {
            const url = `https://apis.roblox.com/universes/v1/places/${placeId}/universe`;
            const response = await fetch(url);
            const data = await response.json();
            return data.universeId;
          }
          
          async function fetchGameDetails(universeId) {
            const url = `https://games.roblox.com/v1/games?universeIds=${universeId}`;
            const response = await fetch(url);
            const data = await response.json();
            return data.data[0];
          }
          
          async function fetchIcon(universeId) {
            const url = `https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=256x256&format=Png&isCircular=false`;
            const response = await fetch(url);
            const data = await response.json();
            return data.data?.[0]?.imageUrl || '';
          }
          
          async function fetchThumbnails(universeId) {
            const url = `https://thumbnails.roblox.com/v1/games/multiget/thumbnails?universeIds=${universeId}&countPerUniverse=8&size=768x432&format=Png&isCircular=false`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.data && data.data[0] && data.data[0].thumbnails) {
              return data.data[0].thumbnails.map(t => t.imageUrl);
            }
            return [];
          }
          
          async function processGame(game, index) {
            console.log(`[${index + 1}] Processing: ${game.gameLink || game.placeId}`);
            
            try {
              const universeId = await fetchUniverseId(game.placeId);
              console.log(`  ✅ Universe ID: ${universeId}`);
              
              const details = await fetchGameDetails(universeId);
              console.log(`  ✅ Game: ${details.name} (${details.playing} players)`);
              
              const iconUrl = await fetchIcon(universeId);
              const thumbnails = await fetchThumbnails(universeId);
              
              console.log(`  ✅ Got ${thumbnails.length} fresh thumbnails`);
              
              return {
                ...game,
                universeId,
                name: details.name,
                playerCount: details.playing,
                created: details.created,
                updated: details.updated,
                ownerName: details.creator.name,
                ownerUrl: details.creator.type === 'Group' 
                  ? `https://www.roblox.com/groups/${details.creator.id}`
                  : `https://www.roblox.com/users/${details.creator.id}/profile`,
                thumbnailUrl: iconUrl,
                thumbnails: thumbnails,
                gameUrl: `https://www.roblox.com/games/${game.placeId}`
              };
            } catch (err) {
              console.error(`  ❌ Failed: ${err.message}`);
              return {
                ...game,
                name: 'Failed to load',
                playerCount: '?',
                created: '?',
                updated: '?',
                ownerName: '?',
                thumbnailUrl: '',
                thumbnails: [],
                gameUrl: game.gameLink || '#'
              };
            }
          }
          
          async function main() {
            console.log(`📦 Processing ${gamesData.games.length} games...`);
            
            const enrichedGames = [];
            for (let i = 0; i < gamesData.games.length; i++) {
              const result = await processGame(gamesData.games[i], i);
              enrichedGames.push(result);
              // Small delay to avoid rate limits
              await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            const output = {
              lastUpdated: new Date().toISOString().split('T')[0],
              lastUpdatedFull: new Date().toISOString(),
              games: enrichedGames
            };
            
            fs.writeFileSync('games-data.json', JSON.stringify(output, null, 2));
            console.log(`✅ Saved ${enrichedGames.length} games to games-data.json`);
          }
          
          main().catch(console.error);
          EOF
      
      - name: Run fetch script
        run: node fetch-games.js
      
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add games-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update game data [skip ci]"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
