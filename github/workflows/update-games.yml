name: Update Game Data

on:
  # Scheduled runs - every 6 hours
  schedule:
    - cron: '0 */6 * * *'  # Runs at minute 0 every 6 hours
    
  # Manual trigger (you click a button)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 👈 ADD THIS LINE
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4  # Updated to v4
        with:
          node-version: '18'
      
      - name: Create game data script
        run: |
          cat > fetch-games.js << 'EOF'
          const fs = require('fs');
          
          // Load your base games.json
          const baseGames = JSON.parse(fs.readFileSync('games.json', 'utf8'));
          
          async function fetchGameData() {
            const games = [];
            
            for (const game of baseGames.games) {
              try {
                console.log(`Fetching: ${game.placeId || game.url}`);
                
                // Get placeId from either direct ID or URL
                let placeId = game.placeId;
                if (!placeId && game.url) {
                  const match = game.url.match(/games\/(\d+)/);
                  placeId = match ? match[1] : null;
                }
                if (!placeId) throw new Error('No valid placeId found');
                
                // 1. Get universeId from placeId
                const universeRes = await fetch(`https://apis.roblox.com/universes/v1/places/${placeId}/universe`);
                const universeData = await universeRes.json();
                const universeId = universeData.universeId;
                
                // 2. Get game details
                const detailsRes = await fetch(`https://games.roblox.com/v1/games?universeIds=${universeId}`);
                const detailsData = await detailsRes.json();
                const details = detailsData.data[0];
                
                // 3. Get icon URL
                const iconRes = await fetch(`https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=512x512&format=Png`);
                const iconData = await iconRes.json();
                const iconUrl = iconData.data?.[0]?.thumbnails?.[0]?.imageUrl || '';
                
                games.push({
                  ...game,
                  universeId,
                  placeId,
                  name: details.name,
                  playerCount: details.playing,
                  created: details.created,
                  updated: details.updated,
                  ownerName: details.creator.name,
                  ownerUrl: details.creator.type === 'Group' 
                    ? `https://www.roblox.com/groups/${details.creator.id}`
                    : `https://www.roblox.com/users/${details.creator.id}/profile`,
                  thumbnailUrl: iconUrl,
                  gameUrl: `https://www.roblox.com/games/${placeId}`
                });
                
                console.log(`✅ Success: ${details.name}`);
              } catch (err) {
                console.error(`❌ Failed: ${game.placeId || game.url}`, err.message);
                games.push({
                  ...game,
                  name: 'Failed to load',
                  playerCount: '?',
                  created: '?',
                  updated: '?',
                  ownerName: '?',
                  thumbnailUrl: '',
                  gameUrl: '#',
                  error: err.message
                });
              }
            }
            
            // Save to file with timestamp
            const output = {
              lastUpdated: new Date().toISOString().split('T')[0],
              lastUpdatedFull: new Date().toISOString(),
              games: games
            };
            
            fs.writeFileSync('games-data.json', JSON.stringify(output, null, 2));
            console.log(`✅ Saved ${games.length} games to games-data.json`);
          }
          
          fetchGameData();
          EOF
      
      - name: Run fetch script
        run: node fetch-games.js
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add games-data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update game data [skip ci]"
          git push
