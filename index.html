<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMINA · game list</title>
    <style>
        /* Keep ALL your existing CSS - it's perfect */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #e8f0fe;
            color: #1a2b3c;
            line-height: 1.4;
            padding: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .topbar {
            background: #1a2b3c;
            color: #e8f0fe;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #5f9ea0;
        }
        .topbar .nav a {
            color: #e8f0fe;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .topbar .nav a:hover {
            color: #5f9ea0;
        }
        
        .filter-bar {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .filter-label {
            font-weight: 600;
            color: #1a2b3c;
        }
        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }
        .tag-filter-btn {
            background: none;
            border: 1px solid #cbd5e0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            color: #1a2b3c;
        }
        .tag-filter-btn:hover {
            background: #e8f0fe;
            border-color: #5f9ea0;
        }
        .tag-filter-btn.active {
            background: #5f9ea0;
            border-color: #5f9ea0;
            color: white;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #5f9ea0;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
        }
        
        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .game-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .game-thumb {
            flex: 0 0 120px;
        }
        .game-thumb img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .game-info {
            flex: 1;
            min-width: 250px;
        }
        .game-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .game-title a {
            color: #1a2b3c;
            text-decoration: none;
        }
        .game-title a:hover {
            color: #5f9ea0;
        }
        
        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .tag {
            background: #e8f0fe;
            color: #1a2b3c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #cbd5e0;
        }
        .tag.og {
            background: #ffd700;
            color: #1a2b3c;
            border-color: #daa520;
        }
        
        .expand-btn {
            background: none;
            border: 1px solid #5f9ea0;
            color: #5f9ea0;
            font-size: 13px;
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        .expand-btn:hover {
            background: #5f9ea0;
            color: white;
        }
        .game-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px 12px;
            background: #f0f7ff;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0 8px;
            font-size: 13px;
            border-left: 3px solid #5f9ea0;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-label {
            color: #4a5b6b;
            font-weight: 500;
        }
        .stat-value {
            font-weight: 600;
            color: #1a2b3c;
        }
        .stat-value a {
            color: #1a2b3c;
            text-decoration: none;
            border-bottom: 1px dotted #9aa9b7;
        }
        .stat-value a:hover {
            color: #5f9ea0;
        }
        .maintainer-note {
            margin-top: 10px;
            padding: 8px 12px;
            background: #f8faff;
            border-left: 3px solid #5f9ea0;
            border-radius: 4px;
            font-size: 13px;
            color: #2c3e50;
        }
        .maintainer-note strong {
            color: #1a2b3c;
            font-weight: 600;
        }
        
        .thumbnail-gallery {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .thumbnail-gallery img {
            width: calc(25% - 6px);
            min-width: 140px;
            flex: 1 1 auto;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #b0c4de;
            background: #dbeafe;
        }
        
        .subgames {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e0;
            display: none;
        }
        .subgames.visible {
            display: block;
        }
        .subgame-card {
            background: #f5faff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #d4e0ec;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .subgame-thumb {
            flex: 0 0 80px;
        }
        .subgame-thumb img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .subgame-info {
            flex: 1;
        }
        .subgame-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .subgame-title a {
            color: #1a2b3c;
            text-decoration: none;
        }
        .subgame-title a:hover {
            color: #5f9ea0;
        }
        .subgame-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            font-size: 12px;
        }
        .loading, .error {
            text-align: center;
            padding: 40px;
        }
        .error { color: #c00; }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="topbar">
        <span>📅 COMINA GAME LIST <span id="last-updated"></span></span>
        <div class="nav">
            <a href="index.html">home</a>
            <a href="about.html">about</a>
        </div>
    </div>

    <div class="filter-bar">
        <span class="filter-label">filter by tag:</span>
        <div class="tag-filters" id="tag-filters"></div>
        <button class="clear-btn" id="clear-filters">clear</button>
    </div>

    <div id="game-grid" class="game-grid"><div class="loading">loading games...</div></div>

</div>

<script>
    // ==================== LOAD STATIC GAME DATA ====================
    // NO PROXIES! NO CORS! Just a simple JSON file updated by GitHub Actions
    async function loadGames() {
        const grid = document.getElementById('game-grid');
        
        try {
            const response = await fetch('games-data.json');
            const data = await response.json();
            
            // Update last updated display
            if (data.lastUpdated) {
                document.getElementById('last-updated').textContent = `(updated ${data.lastUpdated})`;
            }
            
            const games = data.games || [];
            renderGames(games);
            buildTagFilters(games);
            
        } catch (err) {
            console.error('Failed to load games:', err);
            grid.innerHTML = '<div class="error">⚠️ Failed to load games — try refreshing</div>';
        }
    }

    // ==================== RENDER GAMES ====================
    function renderGames(games) {
        const grid = document.getElementById('game-grid');
        if (!games.length) {
            grid.innerHTML = '<div class="loading">no games found</div>';
            return;
        }
        
        let html = '';
        games.forEach((game, index) => {
            const hasSubgames = game.subgames && game.subgames.length > 0;
            
            // Format dates
            const createdDate = game.created ? new Date(game.created).toLocaleDateString() : '?';
            const updatedDate = game.updated ? new Date(game.updated).toLocaleDateString() : '?';
            
            // Build tags HTML
            let tagsHtml = '';
            if (game.tags && game.tags.length > 0) {
                tagsHtml = '<div class="game-tags">';
                game.tags.forEach(tag => {
                    const tagClass = tag === 'OG' ? 'tag og' : 'tag';
                    tagsHtml += `<span class="${tagClass}">${tag}</span>`;
                });
                tagsHtml += '</div>';
            }
            
            // Build thumbnails HTML
            let thumbnailsHtml = '';
            if (game.thumbnails && game.thumbnails.length > 0) {
                thumbnailsHtml = '<div class="thumbnail-gallery">';
                game.thumbnails.slice(0, 8).forEach(url => {
                    thumbnailsHtml += `<img src="${url}" alt="screenshot" onerror="this.style.display='none'">`;
                });
                thumbnailsHtml += '</div>';
            }
            
            html += `
                <div class="game-card">
                    <div class="game-thumb">
                        <img src="${game.thumbnailUrl || 'https://placehold.co/120x120/5f9ea0/white?text=Game'}" alt="${game.name}" onerror="this.src='https://placehold.co/120x120/5f9ea0/white?text=No+Icon'">
                    </div>
                    <div class="game-info">
                        <div class="game-title">
                            <a href="${game.gameUrl}">${game.name}</a>
                            ${hasSubgames ? `<button class="expand-btn" onclick="toggleSubgames(${index})">▼ subgames</button>` : ''}
                        </div>
                        ${tagsHtml}
                        <div class="game-stats">
                            <span class="stat-item"><span class="stat-label">players:</span> <span class="stat-value">${game.playerCount}</span></span>
                            <span class="stat-item"><span class="stat-label">created:</span> <span class="stat-value">${createdDate}</span></span>
                            <span class="stat-item"><span class="stat-label">updated:</span> <span class="stat-value">${updatedDate}</span></span>
                            <span class="stat-item"><span class="stat-label">owner:</span> <span class="stat-value"><a href="${game.ownerUrl}">${game.ownerName}</a></span></span>
                        </div>
                        <div class="maintainer-note">
                            <strong>✎ note:</strong> ${game.maintainerNote}
                        </div>
                        ${thumbnailsHtml}
                        <div id="subgames-${index}" class="subgames">
            `;
            
            if (hasSubgames) {
                game.subgames.forEach(sub => {
                    html += `
                        <div class="subgame-card">
                            <div class="subgame-thumb">
                                <img src="https://placehold.co/80x80/5f9ea0/white?text=Sub" alt="subgame">
                            </div>
                            <div class="subgame-info">
                                <div class="subgame-title"><a href="${sub.gameLink || '#'}">${sub.name || 'Subgame'}</a></div>
                                <div class="subgame-stats">
                                    <span>${sub.note || ''}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += `</div></div></div>`;
        });
        
        grid.innerHTML = html;
    }

    // ==================== TAG FILTERS ====================
    let currentGames = [];
    
    function buildTagFilters(games) {
        currentGames = games;
        const tagSet = new Set();
        games.forEach(game => game.tags?.forEach(tag => tagSet.add(tag)));
        
        const filterContainer = document.getElementById('tag-filters');
        filterContainer.innerHTML = '';
        
        Array.from(tagSet).sort().forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-filter-btn';
            btn.textContent = tag;
            btn.onclick = () => filterByTag(tag);
            filterContainer.appendChild(btn);
        });
    }

    function filterByTag(tag) {
        const filtered = currentGames.filter(g => g.tags?.includes(tag));
        renderGames(filtered);
        document.querySelectorAll('.tag-filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === tag);
        });
    }

    document.getElementById('clear-filters').onclick = () => {
        renderGames(currentGames);
        document.querySelectorAll('.tag-filter-btn').forEach(btn => btn.classList.remove('active'));
    };

    window.toggleSubgames = function(index) {
        const div = document.getElementById(`subgames-${index}`);
        const btn = event.target;
        div.classList.toggle('visible');
        btn.textContent = div.classList.contains('visible') ? '▲ subgames' : '▼ subgames';
    };

    // Start
    loadGames();
</script>
</body>
</html>
