<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMINA · game list</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #e8f0fe;
            color: #1a2b3c;
            line-height: 1.4;
            padding: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .topbar {
            background: #1a2b3c;
            color: #e8f0fe;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #5f9ea0;
        }
        .topbar .nav a {
            color: #e8f0fe;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .topbar .nav a:hover {
            color: #5f9ea0;
        }
        
        .filter-bar {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .filter-label {
            font-weight: 600;
            color: #1a2b3c;
        }
        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }
        .tag-filter-btn {
            background: none;
            border: 1px solid #cbd5e0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            color: #1a2b3c;
        }
        .tag-filter-btn:hover {
            background: #e8f0fe;
            border-color: #5f9ea0;
        }
        .tag-filter-btn.active {
            background: #5f9ea0;
            border-color: #5f9ea0;
            color: white;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #5f9ea0;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
        }
        
        /* Sort controls */
        .sort-bar {
            background: white;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .sort-label {
            font-weight: 600;
            color: #1a2b3c;
            font-size: 13px;
        }
        .sort-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .sort-btn {
            background: none;
            border: 1px solid #cbd5e0;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            color: #1a2b3c;
        }
        .sort-btn:hover {
            background: #e8f0fe;
            border-color: #5f9ea0;
        }
        .sort-btn.active {
            background: #5f9ea0;
            border-color: #5f9ea0;
            color: white;
        }
        
        /* Failed games toggle */
        .failed-toggle-bar {
            background: white;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid #ffaaa5;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .failed-toggle-btn {
            background: #ffdddd;
            border: 1px solid #ff0000;
            color: #aa0000;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .failed-toggle-btn.active {
            background: #ff0000;
            color: white;
            border-color: #aa0000;
        }
        .failed-count {
            font-size: 12px;
            color: #666;
        }
        
        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .game-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .game-card.failed {
            opacity: 0.7;
            background: #fff0f0;
            border-color: #ffaaa5;
        }
        .game-thumb {
            flex: 0 0 120px;
        }
        .game-thumb img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .game-info {
            flex: 1;
            min-width: 250px;
        }
        .game-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .game-title a {
            color: #1a2b3c;
            text-decoration: none;
            position: relative;
        }
        .game-title a:hover {
            color: #5f9ea0;
        }
        .game-title a:hover:after {
            content: attr(href);
            position: absolute;
            bottom: 100%;
            left: 0;
            background: #1a2b3c;
            color: #e8f0fe;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 10;
            margin-bottom: 5px;
        }
        
        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .tag {
            background: #e8f0fe;
            color: #1a2b3c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #cbd5e0;
        }
        .tag.og {
            background: #ffd700;
            color: #1a2b3c;
            border-color: #daa520;
        }
        .tag.failed {
            background: #ffdddd;
            color: #aa0000;
            border-color: #ff0000;
        }
        
        .expand-btn {
            background: none;
            border: 1px solid #5f9ea0;
            color: #5f9ea0;
            font-size: 13px;
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        .expand-btn:hover {
            background: #5f9ea0;
            color: white;
        }
        .game-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px 12px;
            background: #f0f7ff;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0 8px;
            font-size: 13px;
            border-left: 3px solid #5f9ea0;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-label {
            color: #4a5b6b;
            font-weight: 500;
        }
        .stat-value {
            font-weight: 600;
            color: #1a2b3c;
            cursor: help;
            border-bottom: 1px dotted #9aa9b7;
        }
        .stat-value a {
            color: #1a2b3c;
            text-decoration: none;
            border-bottom: 1px dotted #9aa9b7;
        }
        .stat-value a:hover {
            color: #5f9ea0;
        }
        .maintainer-note {
            margin-top: 10px;
            padding: 8px 12px;
            background: #f8faff;
            border-left: 3px solid #5f9ea0;
            border-radius: 4px;
            font-size: 13px;
            color: #2c3e50;
        }
        
        /* Thumbnail gallery styles */
        .thumbnail-section {
            margin-top: 16px;
        }
        .gallery-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .gallery-toggle {
            background: none;
            border: 1px solid #5f9ea0;
            color: #5f9ea0;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
        }
        .gallery-toggle:hover {
            background: #5f9ea0;
            color: white;
        }
        .thumbnail-count {
            font-size: 12px;
            color: #666;
        }
        .thumbnail-gallery {
            display: none;
            flex-direction: column;
            gap: 8px;
        }
        .thumbnail-gallery.expanded {
            display: flex;
        }
        .thumbnail-main {
            width: 100%;
            background: #f0f7ff;
            border-radius: 6px;
            border: 1px solid #b0c4de;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thumbnail-main img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #dbeafe;
        }
        .thumbnail-strip {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0;
        }
        .thumbnail-strip img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            background: #dbeafe;
        }
        .thumbnail-strip img.active {
            border-color: #5f9ea0;
        }
        .thumbnail-strip img:hover {
            opacity: 0.8;
        }
        
        .subgames {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e0;
            display: none;
        }
        .subgames.visible {
            display: block;
        }
        .subgame-card {
            background: #f5faff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #d4e0ec;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .subgame-thumb {
            flex: 0 0 80px;
        }
        .subgame-thumb img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .subgame-info {
            flex: 1;
        }
        .subgame-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .subgame-title a {
            color: #1a2b3c;
            text-decoration: none;
        }
        .subgame-title a:hover {
            color: #5f9ea0;
        }
        .subgame-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            font-size: 12px;
        }
        .loading, .error {
            text-align: center;
            padding: 40px;
        }
        .error { color: #c00; }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        /* Tooltip styles */
        [data-tooltip] {
            position: relative;
            cursor: help;
        }
        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2b3c;
            color: #e8f0fe;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            display: none;
            z-index: 10;
            margin-bottom: 5px;
        }
        [data-tooltip]:hover:before {
            display: block;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="topbar">
        <span>📅 COMINA GAME LIST <span id="last-updated"></span></span>
        <div class="nav">
            <a href="index.html">home</a>
            <a href="about.html">about</a>
        </div>
    </div>

    <div class="filter-bar">
        <span class="filter-label">filter by tag:</span>
        <div class="tag-filters" id="tag-filters"></div>
        <button class="clear-btn" id="clear-filters">clear</button>
    </div>

    <!-- FAILED GAMES TOGGLE -->
    <div class="failed-toggle-bar" id="failed-toggle-bar">
        <span class="sort-label">failed games:</span>
        <button class="failed-toggle-btn" id="failed-toggle-btn">hide failed games</button>
        <span class="failed-count" id="failed-count">loading...</span>
    </div>

    <!-- SORT CONTROLS -->
    <div class="sort-bar">
        <span class="sort-label">sort by:</span>
        <div class="sort-options" id="sort-options">
            <button class="sort-btn" data-sort="default">default</button>
            <button class="sort-btn" data-sort="recent-update">most recent update</button>
            <button class="sort-btn" data-sort="oldest-update">oldest update</button>
            <button class="sort-btn" data-sort="recent-creation">newest game</button>
            <button class="sort-btn" data-sort="oldest-creation">oldest game</button>
            <button class="sort-btn" data-sort="most-players">most players</button>
            <button class="sort-btn" data-sort="dead-first">dead games first</button>
            <button class="sort-btn" data-sort="failed-only">show only failed</button>
        </div>
    </div>

    <div id="game-grid" class="game-grid"><div class="loading">loading games...</div></div>

</div>

<script>
    // ==================== RELATIVE TIME HELPER ====================
    function getRelativeTime(dateString) {
        if (!dateString || dateString === '?') return '?';
        
        const date = new Date(dateString);
        const now = new Date();
        const diffMs = now - date;
        const diffSec = Math.floor(diffMs / 1000);
        const diffMin = Math.floor(diffSec / 60);
        const diffHour = Math.floor(diffMin / 60);
        const diffDay = Math.floor(diffHour / 24);
        const diffMonth = Math.floor(diffDay / 30);
        const diffYear = Math.floor(diffMonth / 12);

        if (diffSec < 60) return 'just now';
        if (diffMin < 60) return `${diffMin} minute${diffMin > 1 ? 's' : ''} ago`;
        if (diffHour < 24) return `${diffHour} hour${diffHour > 1 ? 's' : ''} ago`;
        if (diffDay < 30) return `${diffDay} day${diffDay > 1 ? 's' : ''} ago`;
        if (diffMonth < 12) return `${diffMonth} month${diffMonth > 1 ? 's' : ''} ago`;
        return `${diffYear} year${diffYear > 1 ? 's' : ''} ago`;
    }

    // ==================== GLOBAL STATE ====================
    let originalGames = [];
    let currentGames = [];
    let showFailedGames = true;
    let currentSort = 'default';
    let currentTagFilter = null;

    // ==================== LOAD STATIC GAME DATA ====================
    async function loadGames() {
        const grid = document.getElementById('game-grid');
        
        try {
            const response = await fetch('games-data.json');
            const data = await response.json();
            
            // Update last updated display with relative time
            if (data.lastUpdated) {
                const relativeTime = getRelativeTime(data.lastUpdated);
                document.getElementById('last-updated').textContent = `(updated ${relativeTime})`;
                document.getElementById('last-updated').setAttribute('data-tooltip', `absolute: ${data.lastUpdated}`);
            }
            
            // Store original games
            originalGames = data.games;
            
            // Update failed count
            const failedCount = originalGames.filter(g => g.name === 'Failed to load').length;
            document.getElementById('failed-count').textContent = `${failedCount} failed games`;
            
            // Initial render (failed games hidden by default)
            showFailedGames = false;
            document.getElementById('failed-toggle-btn').textContent = 'show failed games';
            currentGames = filterAndSortGames();
            
            renderGames(currentGames);
            buildTagFilters(originalGames);
            setupSortButtons();
            setupFailedToggle();
            
        } catch (err) {
            console.error('Failed to load games:', err);
            grid.innerHTML = '<div class="error">⚠️ Failed to load games</div>';
        }
    }

    // ==================== FILTER AND SORT GAMES ====================
    function filterAndSortGames() {
        // Start with all games
        let games = [...originalGames];
        
        // Apply tag filter if active
        if (currentTagFilter) {
            games = games.filter(g => g.tags?.includes(currentTagFilter));
        }
        
        // Separate failed games
        const failedGames = games.filter(g => g.name === 'Failed to load');
        const successfulGames = games.filter(g => g.name !== 'Failed to load');
        
        // Sort successful games based on currentSort
        let sortedSuccessful = [...successfulGames];
        
        switch(currentSort) {
            case 'recent-update':
                sortedSuccessful.sort((a, b) => {
                    if (!a.updated || a.updated === '?') return 1;
                    if (!b.updated || b.updated === '?') return -1;
                    return new Date(b.updated) - new Date(a.updated);
                });
                break;
            case 'oldest-update':
                sortedSuccessful.sort((a, b) => {
                    if (!a.updated || a.updated === '?') return 1;
                    if (!b.updated || b.updated === '?') return -1;
                    return new Date(a.updated) - new Date(b.updated);
                });
                break;
            case 'recent-creation':
                sortedSuccessful.sort((a, b) => {
                    if (!a.created || a.created === '?') return 1;
                    if (!b.created || b.created === '?') return -1;
                    return new Date(b.created) - new Date(a.created);
                });
                break;
            case 'oldest-creation':
                sortedSuccessful.sort((a, b) => {
                    if (!a.created || a.created === '?') return 1;
                    if (!b.created || b.created === '?') return -1;
                    return new Date(a.created) - new Date(b.created);
                });
                break;
            case 'most-players':
                sortedSuccessful.sort((a, b) => {
                    const aPlayers = typeof a.playerCount === 'number' ? a.playerCount : 0;
                    const bPlayers = typeof b.playerCount === 'number' ? b.playerCount : 0;
                    return bPlayers - aPlayers;
                });
                break;
            case 'dead-first':
                sortedSuccessful.sort((a, b) => {
                    const aDead = a.tags?.includes('dead') ? 1 : 0;
                    const bDead = b.tags?.includes('dead') ? 1 : 0;
                    return bDead - aDead;
                });
                break;
            case 'failed-only':
                return failedGames; // Return only failed games
            default:
                // Keep original order relative to originalGames
                sortedSuccessful = successfulGames;
                break;
        }
        
        // If showing failed games, add them at the end
        if (showFailedGames) {
            return [...sortedSuccessful, ...failedGames];
        } else {
            return sortedSuccessful;
        }
    }

    // ==================== APPLY ALL FILTERS AND SORTS ====================
    function applyFiltersAndSort() {
        currentGames = filterAndSortGames();
        renderGames(currentGames);
    }

    // ==================== SETUP SORT BUTTONS ====================
    function setupSortButtons() {
        const sortButtons = document.querySelectorAll('.sort-btn');
        sortButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const sortType = e.target.dataset.sort;
                
                // Update active state
                sortButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                // Set current sort
                currentSort = sortType;
                
                // If sort is 'failed-only', auto-hide failed toggle
                if (sortType === 'failed-only') {
                    showFailedGames = true; // Show failed games since we're filtering for them
                    document.getElementById('failed-toggle-btn').textContent = 'hide failed games';
                }
                
                // Apply filters and sort
                applyFiltersAndSort();
            });
        });
    }

    // ==================== SETUP FAILED TOGGLE ====================
    function setupFailedToggle() {
        const toggleBtn = document.getElementById('failed-toggle-btn');
        toggleBtn.addEventListener('click', () => {
            showFailedGames = !showFailedGames;
            toggleBtn.textContent = showFailedGames ? 'hide failed games' : 'show failed games';
            
            // If we're in 'failed-only' sort mode, turn it off
            if (currentSort === 'failed-only') {
                currentSort = 'default';
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-sort="default"]').classList.add('active');
            }
            
            applyFiltersAndSort();
        });
    }

    // ==================== TOGGLE GALLERY ====================
    window.toggleGallery = function(galleryId) {
        const gallery = document.getElementById(galleryId);
        const btn = document.querySelector(`[onclick="toggleGallery('${galleryId}')"]`);
        if (gallery && btn) {
            gallery.classList.toggle('expanded');
            btn.textContent = gallery.classList.contains('expanded') ? '▼ hide gallery' : '▶ show gallery';
        }
    };

    // ==================== THUMBNAIL GALLERY COMPONENT ====================
    function createThumbnailGallery(thumbnails, gameIndex) {
        if (!thumbnails || thumbnails.length === 0) return '';
        
        const galleryId = `gallery-${gameIndex}`;
        let html = `<div class="thumbnail-section">`;
        
        // Header with toggle button and count
        html += `<div class="gallery-header">`;
        html += `<button class="gallery-toggle" onclick="toggleGallery('${galleryId}')">▶ show gallery</button>`;
        html += `<span class="thumbnail-count">${thumbnails.length} screenshot${thumbnails.length > 1 ? 's' : ''}</span>`;
        html += `</div>`;
        
        // Gallery container
        html += `<div class="thumbnail-gallery" id="${galleryId}">`;
        
        // Main display image (first thumbnail)
        html += `<div class="thumbnail-main" onclick="cycleThumbnail('${galleryId}')">`;
        html += `<img src="${thumbnails[0]}" alt="screenshot" class="main-thumbnail">`;
        html += `</div>`;
        
        // Thumbnail strip
        if (thumbnails.length > 1) {
            html += `<div class="thumbnail-strip">`;
            thumbnails.forEach((url, idx) => {
                html += `<img src="${url}" alt="thumb" class="${idx === 0 ? 'active' : ''}" onclick="setThumbnail('${galleryId}', ${idx})">`;
            });
            html += `</div>`;
        }
        
        html += `</div></div>`;
        return html;
    }

    // ==================== THUMBNAIL FUNCTIONS ====================
    window.setThumbnail = function(galleryId, index) {
        const gallery = document.getElementById(galleryId);
        if (!gallery) return;
        
        const mainImg = gallery.querySelector('.main-thumbnail');
        const thumbnails = Array.from(gallery.querySelectorAll('.thumbnail-strip img'));
        
        if (mainImg && thumbnails.length > 0) {
            const thumbnailsData = window.thumbnailData?.[galleryId] || [];
            if (thumbnailsData[index]) {
                mainImg.src = thumbnailsData[index];
                
                // Update active state
                thumbnails.forEach((thumb, i) => {
                    if (i === index) thumb.classList.add('active');
                    else thumb.classList.remove('active');
                });
            }
        }
    };

    window.cycleThumbnail = function(galleryId) {
        const gallery = document.getElementById(galleryId);
        if (!gallery) return;
        
        const mainImg = gallery.querySelector('.main-thumbnail');
        const thumbnails = Array.from(gallery.querySelectorAll('.thumbnail-strip img'));
        
        if (mainImg && thumbnails.length > 0) {
            // Find current index
            let currentIndex = 0;
            thumbnails.forEach((thumb, i) => {
                if (thumb.classList.contains('active')) currentIndex = i;
            });
            
            // Cycle to next
            const nextIndex = (currentIndex + 1) % thumbnails.length;
            const thumbnailsData = window.thumbnailData?.[galleryId] || [];
            if (thumbnailsData[nextIndex]) {
                mainImg.src = thumbnailsData[nextIndex];
                
                // Update active state
                thumbnails.forEach((thumb, i) => {
                    if (i === nextIndex) thumb.classList.add('active');
                    else thumb.classList.remove('active');
                });
            }
        }
    };

    // ==================== RENDER GAMES ====================
    function renderGames(games) {
        const grid = document.getElementById('game-grid');
        if (!games.length) {
            grid.innerHTML = '<div class="loading">no games found</div>';
            return;
        }
        
        // Store thumbnail data globally
        window.thumbnailData = {};
        
        let html = '';
        games.forEach((game, index) => {
            const hasSubgames = game.subgames && game.subgames.length > 0;
            const isFailed = game.name === 'Failed to load';
            
            // Format dates with relative time
            const createdRelative = getRelativeTime(game.created);
            const updatedRelative = getRelativeTime(game.updated);
            const createdAbsolute = game.created ? new Date(game.created).toLocaleDateString() : '?';
            const updatedAbsolute = game.updated ? new Date(game.updated).toLocaleDateString() : '?';
            
            // Build tags HTML
            let tagsHtml = '';
            if (game.tags && game.tags.length > 0) {
                tagsHtml = '<div class="game-tags">';
                game.tags.forEach(tag => {
                    const tagClass = tag === 'OG' ? 'tag og' : 'tag';
                    tagsHtml += `<span class="${tagClass}">${tag}</span>`;
                });
                if (isFailed) {
                    tagsHtml += `<span class="tag failed">failed to fetch</span>`;
                }
                tagsHtml += '</div>';
            } else if (isFailed) {
                tagsHtml = '<div class="game-tags"><span class="tag failed">failed to fetch</span></div>';
            }
            
            // Store thumbnail data
            const galleryId = `gallery-${index}`;
            if (game.thumbnails && game.thumbnails.length > 0) {
                window.thumbnailData[galleryId] = game.thumbnails;
            }
            
            const thumbnailsHtml = createThumbnailGallery(game.thumbnails, index);
            
            html += `
                <div class="game-card ${isFailed ? 'failed' : ''}">
                    <div class="game-thumb">
                        <img src="${game.thumbnailUrl || 'https://placehold.co/120x120/5f9ea0/white?text=Game'}" alt="${game.name}" onerror="this.src='https://placehold.co/120x120/5f9ea0/white?text=No+Icon'">
                    </div>
                    <div class="game-info">
                        <div class="game-title">
                            <a href="${game.gameUrl}">${game.name}</a>
                            ${hasSubgames ? `<button class="expand-btn" onclick="toggleSubgames(${index})">▼ subgames</button>` : ''}
                        </div>
                        ${tagsHtml}
                        <div class="game-stats">
                            <span class="stat-item"><span class="stat-label">players:</span> <span class="stat-value">${game.playerCount}</span></span>
                            <span class="stat-item"><span class="stat-label">created:</span> <span class="stat-value" data-tooltip="${createdAbsolute}">${createdRelative}</span></span>
                            <span class="stat-item"><span class="stat-label">updated:</span> <span class="stat-value" data-tooltip="${updatedAbsolute}">${updatedRelative}</span></span>
                            <span class="stat-item"><span class="stat-label">owner:</span> <span class="stat-value"><a href="${game.ownerUrl}">${game.ownerName}</a></span></span>
                        </div>
                        <div class="maintainer-note">
                            <strong>✎ note:</strong> ${game.maintainerNote}
                        </div>
                        ${thumbnailsHtml}
                        <div id="subgames-${index}" class="subgames">
            `;
            
            if (hasSubgames) {
                game.subgames.forEach(sub => {
                    html += `
                        <div class="subgame-card">
                            <div class="subgame-thumb">
                                <img src="https://placehold.co/80x80/5f9ea0/white?text=Sub" alt="subgame">
                            </div>
                            <div class="subgame-info">
                                <div class="subgame-title"><a href="${sub.gameLink || '#'}">${sub.name || 'Subgame'}</a></div>
                                <div class="subgame-stats">
                                    <span>${sub.note || ''}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += `</div></div></div>`;
        });
        
        grid.innerHTML = html;
    }

    // ==================== TAG FILTERS ====================
    function buildTagFilters(games) {
        const tagSet = new Set();
        games.forEach(game => game.tags?.forEach(tag => tagSet.add(tag)));
        
        const filterContainer = document.getElementById('tag-filters');
        filterContainer.innerHTML = '';
        
        Array.from(tagSet).sort().forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-filter-btn';
            btn.textContent = tag;
            btn.onclick = () => filterByTag(tag);
            filterContainer.appendChild(btn);
        });
    }

    function filterByTag(tag) {
        if (currentTagFilter === tag) {
            // Toggle off
            currentTagFilter = null;
            document.querySelectorAll('.tag-filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        } else {
            // Toggle on
            currentTagFilter = tag;
            document.querySelectorAll('.tag-filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === tag);
            });
        }
        
        // Reset sort to default when filtering by tag
        currentSort = 'default';
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-sort="default"]').classList.add('active');
        
        applyFiltersAndSort();
    }

    document.getElementById('clear-filters').onclick = () => {
        currentTagFilter = null;
        currentSort = 'default';
        showFailedGames = false;
        
        document.querySelectorAll('.tag-filter-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-sort="default"]').classList.add('active');
        document.getElementById('failed-toggle-btn').textContent = 'show failed games';
        
        applyFiltersAndSort();
    };

    window.toggleSubgames = function(index) {
        const div = document.getElementById(`subgames-${index}`);
        const btn = event.target;
        div.classList.toggle('visible');
        btn.textContent = div.classList.contains('visible') ? '▲ subgames' : '▼ subgames';
    };

    // Start
    loadGames();
</script>
</body>
</html>
