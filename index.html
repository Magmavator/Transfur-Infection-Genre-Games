<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMINA · game list</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #e8f0fe;
            color: #1a2b3c;
            line-height: 1.4;
            padding: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .topbar {
            background: #1a2b3c;
            color: #e8f0fe;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #5f9ea0;
        }
        .topbar .updated {
            font-size: 13px;
            background: #2c3e50;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: help;
            border-bottom: 1px dotted #8aa0b0;
        }
        .topbar .nav a {
            color: #e8f0fe;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .topbar .nav a:hover {
            color: #5f9ea0;
        }
        
        .filter-bar {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .filter-label {
            font-weight: 600;
            color: #1a2b3c;
        }
        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }
        .tag-filter-btn {
            background: none;
            border: 1px solid #cbd5e0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            color: #1a2b3c;
        }
        .tag-filter-btn:hover {
            background: #e8f0fe;
            border-color: #5f9ea0;
        }
        .tag-filter-btn.active {
            background: #5f9ea0;
            border-color: #5f9ea0;
            color: white;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #5f9ea0;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
        }
        
        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .game-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .game-thumb {
            flex: 0 0 120px;
        }
        .game-thumb img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .game-info {
            flex: 1;
            min-width: 250px;
        }
        .game-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .game-title a {
            color: #1a2b3c;
            text-decoration: none;
        }
        .game-title a:hover {
            color: #5f9ea0;
        }
        
        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .tag {
            background: #e8f0fe;
            color: #1a2b3c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #cbd5e0;
        }
        .tag.og {
            background: #ffd700;
            color: #1a2b3c;
            border-color: #daa520;
        }
        
        .expand-btn {
            background: none;
            border: 1px solid #5f9ea0;
            color: #5f9ea0;
            font-size: 13px;
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        .expand-btn:hover {
            background: #5f9ea0;
            color: white;
        }
        .game-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px 12px;
            background: #f0f7ff;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0 8px;
            font-size: 13px;
            border-left: 3px solid #5f9ea0;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-label {
            color: #4a5b6b;
            font-weight: 500;
        }
        .stat-value {
            font-weight: 600;
            color: #1a2b3c;
            cursor: help;
            border-bottom: 1px dotted #9aa9b7;
        }
        .stat-value a {
            color: #1a2b3c;
            text-decoration: none;
            border-bottom: 1px dotted #9aa9b7;
        }
        .stat-value a:hover {
            color: #5f9ea0;
            border-bottom: 1px solid #5f9ea0;
        }
        [data-tooltip] {
            position: relative;
            cursor: help;
        }
        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2b3c;
            color: #e8f0fe;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            display: none;
            z-index: 10;
            margin-bottom: 5px;
        }
        [data-tooltip]:hover:before {
            display: block;
        }
        .maintainer-note {
            margin-top: 10px;
            padding: 8px 12px;
            background: #f8faff;
            border-left: 3px solid #5f9ea0;
            border-radius: 4px;
            font-size: 13px;
            color: #2c3e50;
        }
        .maintainer-note strong {
            color: #1a2b3c;
            font-weight: 600;
        }
        .subgames {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e0;
            display: none;
        }
        .subgames.visible {
            display: block;
        }
        .subgame-card {
            background: #f5faff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #d4e0ec;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .subgame-thumb {
            flex: 0 0 80px;
        }
        .subgame-thumb img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .subgame-info {
            flex: 1;
        }
        .subgame-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .subgame-title a {
            color: #1a2b3c;
            text-decoration: none;
        }
        .subgame-title a:hover {
            color: #5f9ea0;
        }
        .subgame-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            font-size: 12px;
        }
        .subgame-stats span {
            cursor: help;
            border-bottom: 1px dotted #9aa9b7;
        }
        @media (max-width: 600px) {
            .game-card {
                flex-direction: column;
            }
            .game-thumb {
                flex: 0 0 auto;
                text-align: center;
            }
            .game-stats {
                grid-template-columns: 1fr 1fr;
            }
            .topbar {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .topbar .nav a {
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="topbar">
        <span class="updated" id="last-updated-container">📅 last updated: <span id="last-updated">loading...</span></span>
        <div class="nav">
            <a href="index.html">home</a>
            <a href="about.html">about</a>
            <a href="contact.html">contact</a>
        </div>
    </div>

    <div class="filter-bar">
        <span class="filter-label">filter by tag:</span>
        <div class="tag-filters" id="tag-filters"></div>
        <button class="clear-btn" id="clear-filters">clear</button>
    </div>

    <div id="game-grid" class="game-grid"></div>

</div>

<script>
    let allGames = [];
    let activeFilter = null;
    let siteLastUpdated = "";

    // ==================== RELATIVE TIME HELPER ====================
    function getRelativeTime(dateString) {
        if (!dateString) return "unknown";
        
        const updated = new Date(dateString);
        const now = new Date();
        const diffMs = now - updated;
        const diffSec = Math.floor(diffMs / 1000);
        const diffMin = Math.floor(diffSec / 60);
        const diffHour = Math.floor(diffMin / 60);
        const diffDay = Math.floor(diffHour / 24);
        const diffMonth = Math.floor(diffDay / 30);
        const diffYear = Math.floor(diffMonth / 12);

        if (diffSec < 60) return 'just now';
        if (diffMin < 60) return `${diffMin} minute${diffMin > 1 ? 's' : ''} ago`;
        if (diffHour < 24) return `${diffHour} hour${diffHour > 1 ? 's' : ''} ago`;
        if (diffDay < 30) return `${diffDay} day${diffDay > 1 ? 's' : ''} ago`;
        if (diffMonth < 12) return `${diffMonth} month${diffMonth > 1 ? 's' : ''} ago`;
        return `${diffYear} year${diffYear > 1 ? 's' : ''} ago`;
    }

    // ==================== LOAD JSON AND FETCH LIVE DATA ====================
    fetch('games.json')
        .then(response => response.json())
        .then(async (data) => {
            siteLastUpdated = data.lastUpdated;
            document.getElementById('last-updated').innerText = getRelativeTime(siteLastUpdated);
            document.getElementById('last-updated-container').setAttribute('data-tooltip', `absolute: ${siteLastUpdated}`);

            // Fetch live details and thumbnails for all games
            const gamesWithLiveData = await Promise.all(data.games.map(async (game) => {
                try {
                    // 1. Fetch game details (player count, etc.) using universeId
                    const detailsUrl = `https://games.roblox.com/v1/games?universeIds=${game.universeId}`;
                    const detailsResponse = await fetch(detailsUrl);
                    const detailsData = await detailsResponse.json();
                    const gameDetails = detailsData.data[0];

                    // 2. Fetch the game icon thumbnail
                    const iconUrl = `https://thumbnails.roblox.com/v1/games/icons?universeIds=${game.universeId}&size=512x512&format=Png`;
                    const iconResponse = await fetch(iconUrl);
                    const iconData = await iconResponse.json();
                    const iconImageUrl = iconData.data?.[0]?.thumbnails?.[0]?.imageUrl || 'https://via.placeholder.com/120x120?text=no+icon';

                    // 3. Fetch thumbnails for maintainer note section (3 images)
                    const thumbnailsUrl = `https://thumbnails.roblox.com/v1/games/multiget/thumbnails?universeIds=${game.universeId}&size=768x432&format=Png`;
                    const thumbnailsResponse = await fetch(thumbnailsUrl);
                    const thumbnailsData = await thumbnailsResponse.json();
                    const gameThumbnails = thumbnailsData.data?.[0]?.thumbnails?.map(t => t.imageUrl) || [];

                    return {
                        ...game,
                        livePlayerCount: gameDetails?.playing ?? 'N/A',
                        liveDetails: gameDetails,
                        thumbnailUrl: iconImageUrl,
                        gameThumbnails: gameThumbnails.slice(0, 3) // Get up to 3 thumbnails
                    };
                } catch (error) {
                    console.error(`Failed to fetch live data for ${game.name}:`, error);
                    return {
                        ...game,
                        livePlayerCount: 'Error',
                        thumbnailUrl: 'https://via.placeholder.com/120x120?text=error',
                        gameThumbnails: []
                    };
                }
            }));

            allGames = gamesWithLiveData;
            renderGames(allGames);
            buildTagFilters(allGames);
        })
        .catch(error => {
            console.error('Failed to load games:', error);
            document.getElementById('game-grid').innerHTML = '<p style="padding: 40px; text-align: center;">⚠️ failed to load games — check console</p>';
        });

    // ==================== BUILD TAG FILTERS ====================
    function buildTagFilters(games) {
        const tagSet = new Set();
        games.forEach(game => {
            if (game.tags) {
                game.tags.forEach(tag => tagSet.add(tag));
            }
        });
        
        const sortedTags = Array.from(tagSet).sort();
        const filterContainer = document.getElementById('tag-filters');
        
        sortedTags.forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-filter-btn';
            btn.textContent = tag;
            btn.onclick = () => filterByTag(tag);
            filterContainer.appendChild(btn);
        });
        
        if (activeFilter) {
            document.querySelectorAll('.tag-filter-btn').forEach(btn => {
                if (btn.textContent === activeFilter) {
                    btn.classList.add('active');
                }
            });
        }
    }

    // ==================== FILTER FUNCTION ====================
    function filterByTag(tag) {
        if (activeFilter === tag) {
            activeFilter = null;
            renderGames(allGames);
        } else {
            activeFilter = tag;
            const filtered = allGames.filter(game => game.tags && game.tags.includes(tag));
            renderGames(filtered);
        }
        
        document.querySelectorAll('.tag-filter-btn').forEach(btn => {
            if (btn.textContent === activeFilter) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // ==================== CLEAR FILTERS ====================
    document.getElementById('clear-filters').onclick = function() {
        activeFilter = null;
        renderGames(allGames);
        document.querySelectorAll('.tag-filter-btn').forEach(btn => {
            btn.classList.remove('active');
        });
    };

    // ==================== RENDER GAMES ====================
    function renderGames(games) {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';

        games.forEach((game, index) => {
            const hasSubgames = game.subgames && game.subgames.length > 0;

            const gameCard = document.createElement('div');
            gameCard.className = 'game-card';

            let tagsHtml = '';
            if (game.tags && game.tags.length > 0) {
                tagsHtml = '<div class="game-tags">';
                game.tags.forEach(tag => {
                    const tagClass = tag === 'OG' ? 'tag og' : 'tag';
                    tagsHtml += `<span class="${tagClass}">${tag}</span>`;
                });
                tagsHtml += '</div>';
            }

            // Build thumbnails HTML for maintainer note section
            let thumbnailsHtml = '';
            if (game.gameThumbnails && game.gameThumbnails.length > 0) {
                thumbnailsHtml = '<div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;">';
                game.gameThumbnails.forEach(thumbUrl => {
                    thumbnailsHtml += `<img src="${thumbUrl}" style="width:100px; height:60px; object-fit:cover; border-radius:4px; border:1px solid #b0c4de;">`;
                });
                thumbnailsHtml += '</div>';
            }

            let html = `
                <div class="game-thumb">
                    <img src="${game.thumbnailUrl}" alt="${game.name}" onerror="this.src='https://via.placeholder.com/120x120?text=no+image'">
                </div>
                <div class="game-info">
                    <div class="game-title">
                        <a href="${game.url}">${game.name}</a>
                        ${hasSubgames ? `<button class="expand-btn" onclick="toggleSubgames(${index})">▼ subgames</button>` : ''}
                    </div>
                    ${tagsHtml}
                    <div class="game-stats">
                        <span class="stat-item"><span class="stat-label">players:</span> <span class="stat-value">${game.livePlayerCount}</span></span>
                        <span class="stat-item"><span class="stat-label">created:</span> <span class="stat-value" data-tooltip="absolute: ${game.created}">${getRelativeTime(game.created)}</span></span>
                        <span class="stat-item"><span class="stat-label">last update:</span> <span class="stat-value" data-tooltip="absolute: ${game.lastUpdate}">${getRelativeTime(game.lastUpdate)}</span></span>
                        <span class="stat-item"><span class="stat-label">owner:</span> <span class="stat-value"><a href="${game.ownerUrl}">${game.ownerName}</a></span></span>
                    </div>
                    <div class="maintainer-note">
                        <strong>✎ note:</strong> ${game.maintainerNote}
                        ${thumbnailsHtml}
                    </div>
                    <div id="subgames-${index}" class="subgames">
            `;

            if (hasSubgames) {
                game.subgames.forEach(sub => {
                    const subThumb = `https://thumbnails.roblox.com/v1/games/icons?universeIds=${sub.universeId}&size=256x256&format=Png`;
                    html += `
                        <div class="subgame-card">
                            <div class="subgame-thumb">
                                <img src="${subThumb}" alt="${sub.name}" onerror="this.src='https://via.placeholder.com/80x80?text=sub'">
                            </div>
                            <div class="subgame-info">
                                <div class="subgame-title"><a href="${sub.url}">${sub.name}</a></div>
                                <div class="subgame-stats">
                                    <span><span class="stat-label">players:</span> ${sub.players}</span>
                                    <span data-tooltip="absolute: ${sub.lastUpdate}"><span class="stat-label">updated:</span> ${getRelativeTime(sub.lastUpdate)}</span>
                                    <span><span class="stat-label">owner:</span> <a href="${sub.ownerUrl}" style="color:#1a2b3c;">${sub.ownerName}</a></span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            html += `
                    </div>
                </div>
            `;

            gameCard.innerHTML = html;
            grid.appendChild(gameCard);
        });
    }

    // ==================== TOGGLE SUBGAMES ====================
    window.toggleSubgames = function(index) {
        const subgamesDiv = document.getElementById(`subgames-${index}`);
        const btn = event.target;
        if (subgamesDiv.classList.contains('visible')) {
            subgamesDiv.classList.remove('visible');
            btn.textContent = '▼ subgames';
        } else {
            subgamesDiv.classList.add('visible');
            btn.textContent = '▲ subgames';
        }
    };
</script>

</body>
</html>
