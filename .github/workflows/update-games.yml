name: Update Game Data

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]
    paths:
      - 'games.json'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install node-fetch@2
      
      - name: Create fresh fetch script
        run: |
          cat > fetch-games.js << 'EOF'
          const fs = require('fs');
          const fetch = require('node-fetch');
          
          async function main() {
            console.log('📂 Reading games.json...');
            const gamesData = JSON.parse(fs.readFileSync('games.json', 'utf8'));
            console.log(`📦 Found ${gamesData.games.length} games to process`);
            
            const enrichedGames = [];
            
            for (let i = 0; i < gamesData.games.length; i++) {
              const game = gamesData.games[i];
              console.log(`\n[${i + 1}/${gamesData.games.length}] Processing: ${game.gameLink || game.placeId}`);
              
              try {
                // 1. Get universeId
                const universeUrl = `https://apis.roblox.com/universes/v1/places/${game.placeId}/universe`;
                console.log(`  🔍 Fetching universe ID...`);
                const universeRes = await fetch(universeUrl);
                const universeData = await universeRes.json();
                
                if (!universeData.universeId) {
                  throw new Error('No universeId in response');
                }
                const universeId = universeData.universeId;
                console.log(`  ✅ Universe ID: ${universeId}`);
                
                // 2. Get game details
                const detailsUrl = `https://games.roblox.com/v1/games?universeIds=${universeId}`;
                console.log(`  🔍 Fetching game details...`);
                const detailsRes = await fetch(detailsUrl);
                const detailsData = await detailsRes.json();
                
                if (!detailsData.data || !detailsData.data[0]) {
                  throw new Error('No game details in response');
                }
                const details = detailsData.data[0];
                console.log(`  ✅ Game: ${details.name} (${details.playing} players)`);
                
                // 3. Get icon
                const iconUrl = `https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=256x256&format=Png&isCircular=false`;
                console.log(`  🔍 Fetching icon...`);
                const iconRes = await fetch(iconUrl);
                const iconData = await iconRes.json();
                const icon = iconData.data?.[0]?.imageUrl || '';
                console.log(`  ✅ Icon: ${icon ? 'found' : 'not found'}`);
                
                // 4. Get thumbnails
                const thumbUrl = `https://thumbnails.roblox.com/v1/games/multiget/thumbnails?universeIds=${universeId}&countPerUniverse=8&size=768x432&format=Png&isCircular=false`;
                console.log(`  🔍 Fetching thumbnails...`);
                const thumbRes = await fetch(thumbUrl);
                const thumbData = await thumbRes.json();
                
                let thumbnails = [];
                if (thumbData.data && thumbData.data[0] && thumbData.data[0].thumbnails) {
                  thumbnails = thumbData.data[0].thumbnails.map(t => t.imageUrl);
                }
                console.log(`  ✅ Found ${thumbnails.length} thumbnails`);
                
                // Build enriched game object
                enrichedGames.push({
                  ...game,
                  universeId,
                  name: details.name,
                  playerCount: details.playing,
                  created: details.created,
                  updated: details.updated,
                  ownerName: details.creator.name,
                  ownerUrl: details.creator.type === 'Group' 
                    ? `https://www.roblox.com/groups/${details.creator.id}`
                    : `https://www.roblox.com/users/${details.creator.id}/profile`,
                  thumbnailUrl: icon,
                  thumbnails: thumbnails,
                  gameUrl: `https://www.roblox.com/games/${game.placeId}`
                });
                
                console.log(`  ✅ Game ${i + 1} complete`);
                
              } catch (err) {
                console.error(`  ❌ Failed: ${err.message}`);
                enrichedGames.push({
                  ...game,
                  name: 'Failed to load',
                  playerCount: '?',
                  created: '?',
                  updated: '?',
                  ownerName: '?',
                  thumbnailUrl: '',
                  thumbnails: [],
                  gameUrl: game.gameLink || '#'
                });
              }
              
              // Delay to avoid rate limiting
              if (i < gamesData.games.length - 1) {
                console.log('  ⏱️ Waiting 1 second...');
                await new Promise(resolve => setTimeout(resolve, 1000));
              }
            }
            
            // Create output object
            const output = {
              lastUpdated: new Date().toISOString().split('T')[0],
              lastUpdatedFull: new Date().toISOString(),
              games: enrichedGames
            };
            
            // Write file
            console.log('\n📝 Writing games-data.json...');
            fs.writeFileSync('games-data.json', JSON.stringify(output, null, 2));
            
            // Verify file was written
            const stats = fs.statSync('games-data.json');
            console.log(`✅ File created: ${stats.size} bytes`);
            console.log(`✅ Contains ${enrichedGames.length} games`);
            
            // Log first game's thumbnail count as verification
            if (enrichedGames[0] && enrichedGames[0].thumbnails) {
              console.log(`✅ First game has ${enrichedGames[0].thumbnails.length} thumbnails`);
            }
          }
          
          main().catch(err => {
            console.error('❌ Fatal error:', err);
            process.exit(1);
          });
          EOF
      
      - name: Run fetch script
        run: node fetch-games.js
      
      - name: Verify file was created
        run: |
          if [ -f games-data.json ]; then
            echo "✅ games-data.json exists"
            ls -la games-data.json
          else
            echo "❌ games-data.json was not created!"
            exit 1
          fi
      
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add games-data.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update game data [skip ci]"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
            echo "✅ Changes pushed"
          fi
