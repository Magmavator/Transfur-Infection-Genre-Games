<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMINA · game list</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #e8f0fe;
            color: #1a2b3c;
            line-height: 1.4;
            padding: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .topbar {
            background: #1a2b3c;
            color: #e8f0fe;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #5f9ea0;
        }
        .topbar .nav a {
            color: #e8f0fe;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .topbar .nav a:hover {
            color: #5f9ea0;
        }
        
        .filter-bar {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .filter-label {
            font-weight: 600;
            color: #1a2b3c;
        }
        .tag-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }
        .tag-filter-btn {
            background: none;
            border: 1px solid #cbd5e0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            color: #1a2b3c;
        }
        .tag-filter-btn:hover {
            background: #e8f0fe;
            border-color: #5f9ea0;
        }
        .tag-filter-btn.active {
            background: #5f9ea0;
            border-color: #5f9ea0;
            color: white;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #5f9ea0;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
        }
        
        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .game-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .game-thumb {
            flex: 0 0 120px;
        }
        .game-thumb img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .game-info {
            flex: 1;
            min-width: 250px;
        }
        .game-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .game-title a {
            color: #1a2b3c;
            text-decoration: none;
        }
        .game-title a:hover {
            color: #5f9ea0;
        }
        
        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .tag {
            background: #e8f0fe;
            color: #1a2b3c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #cbd5e0;
        }
        .tag.og {
            background: #ffd700;
            color: #1a2b3c;
            border-color: #daa520;
        }
        
        .expand-btn {
            background: none;
            border: 1px solid #5f9ea0;
            color: #5f9ea0;
            font-size: 13px;
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        .expand-btn:hover {
            background: #5f9ea0;
            color: white;
        }
        .game-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px 12px;
            background: #f0f7ff;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0 8px;
            font-size: 13px;
            border-left: 3px solid #5f9ea0;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-label {
            color: #4a5b6b;
            font-weight: 500;
        }
        .stat-value {
            font-weight: 600;
            color: #1a2b3c;
        }
        .stat-value a {
            color: #1a2b3c;
            text-decoration: none;
            border-bottom: 1px dotted #9aa9b7;
        }
        .stat-value a:hover {
            color: #5f9ea0;
        }
        .maintainer-note {
            margin-top: 10px;
            padding: 8px 12px;
            background: #f8faff;
            border-left: 3px solid #5f9ea0;
            border-radius: 4px;
            font-size: 13px;
            color: #2c3e50;
        }
        .maintainer-note strong {
            color: #1a2b3c;
            font-weight: 600;
        }
        
        .thumbnail-gallery {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .thumbnail-gallery img {
            width: calc(25% - 6px);
            min-width: 140px;
            flex: 1 1 auto;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #b0c4de;
            background: #dbeafe;
        }
        
        .subgames {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e0;
            display: none;
        }
        .subgames.visible {
            display: block;
        }
        .subgame-card {
            background: #f5faff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #d4e0ec;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .subgame-thumb {
            flex: 0 0 80px;
        }
        .subgame-thumb img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .subgame-info {
            flex: 1;
        }
        .subgame-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .subgame-title a {
            color: #1a2b3c;
            text-decoration: none;
        }
        .subgame-title a:hover {
            color: #5f9ea0;
        }
        .subgame-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            font-size: 12px;
        }
        .loading, .error {
            text-align: center;
            padding: 40px;
        }
        .error { color: #c00; }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
        .loading-placeholder {
            background: white;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            opacity: 0.7;
        }
        .loading-placeholder .thumb {
            width: 120px;
            height: 120px;
            background: #dbeafe;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5f9ea0;
            font-size: 24px;
        }
        .loading-placeholder .info {
            flex: 1;
            min-width: 250px;
        }
        .loading-placeholder .title {
            height: 32px;
            background: #e8f0fe;
            border-radius: 4px;
            margin-bottom: 8px;
            width: 60%;
        }
        .loading-placeholder .stats {
            height: 80px;
            background: #f0f7ff;
            border-radius: 6px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="topbar">
        <span>📅 COMINA GAME LIST</span>
        <div class="nav">
            <a href="index.html">home</a>
            <a href="about.html">about</a>
        </div>
    </div>

    <div class="filter-bar">
        <span class="filter-label">filter by tag:</span>
        <div class="tag-filters" id="tag-filters"></div>
        <button class="clear-btn" id="clear-filters">clear</button>
    </div>

    <div id="game-grid" class="game-grid"></div>

</div>

<script>
    // ==================== FLOOD CONFIG ====================
    const PROXY = 'https://api.allorigins.win/raw?url=';
    const TIMEOUT = 15000; // 15 second timeout
    const MAX_WAVES = 3; // Number of retry waves
    const PARALLEL_REQUESTS = 3; // Send 3 requests at once

    // ==================== SINGLE FETCH ====================
    async function singleFetch(url, gameIndex, waveNum, reqNum) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), TIMEOUT);
        
        try {
            console.log(`🌊 Game ${gameIndex + 1} [Wave ${waveNum}/${MAX_WAVES} Req ${reqNum + 1}/${PARALLEL_REQUESTS}]: ${url.split('?')[0]}`);
            
            const response = await fetch(PROXY + encodeURIComponent(url), {
                signal: controller.signal
            });
            clearTimeout(timeout);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const text = await response.text();
            
            if (text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html')) {
                throw new Error('Proxy returned HTML');
            }
            
            try {
                const parsed = JSON.parse(text);
                if (parsed.contents && typeof parsed.contents === 'string') {
                    try {
                        return JSON.parse(parsed.contents);
                    } catch {
                        return parsed.contents;
                    }
                }
                return parsed;
            } catch (e) {
                throw new Error('Invalid JSON');
            }
            
        } catch (err) {
            clearTimeout(timeout);
            throw err;
        }
    }

    // ==================== FLOOD FETCH ====================
    async function floodFetch(url, gameIndex, waveNum = 1) {
        console.log(`🚀 Game ${gameIndex + 1}: Starting wave ${waveNum}/${MAX_WAVES} with ${PARALLEL_REQUESTS} parallel requests`);
        
        // Create an array of promises
        const promises = [];
        for (let i = 0; i < PARALLEL_REQUESTS; i++) {
            promises.push(singleFetch(url, gameIndex, waveNum, i));
        }
        
        // Race them - first one to succeed wins
        try {
            const result = await Promise.race(promises);
            console.log(`✅ Game ${gameIndex + 1}: Wave ${waveNum} successful`);
            return result;
        } catch (err) {
            console.log(`⚠️ Game ${gameIndex + 1}: All ${PARALLEL_REQUESTS} requests in wave ${waveNum} failed`);
            
            if (waveNum < MAX_WAVES) {
                console.log(`🔄 Game ${gameIndex + 1}: Starting wave ${waveNum + 1} in 2s...`);
                await new Promise(resolve => setTimeout(resolve, 2000));
                return floodFetch(url, gameIndex, waveNum + 1);
            } else {
                throw new Error(`All ${MAX_WAVES} waves failed`);
            }
        }
    }

    // ==================== LOAD SINGLE GAME ====================
    async function loadSingleGame(game, gamesArray, index, statusDiv) {
        try {
            const placeId = game.placeId;
            if (!placeId) throw new Error('No placeId found');
            
            console.log(`📦 Loading game ${index + 1}: ${game.gameLink || placeId}`);
            
            if (statusDiv) {
                statusDiv.innerHTML = `🔄 Game ${index + 1}: Fetching universe ID...`;
            }
            
            // 1. Get universeId with flood fetch
            const universeData = await floodFetch(
                `https://apis.roblox.com/universes/v1/places/${placeId}/universe`,
                index
            );
            
            if (!universeData || !universeData.universeId) {
                throw new Error('Failed to get universeId');
            }
            const universeId = universeData.universeId;
            
            console.log(`✅ Game ${index + 1}: Got universeId ${universeId}`);
            
            if (statusDiv) {
                statusDiv.innerHTML = `🔄 Game ${index + 1}: Fetching details...`;
            }
            
            // 2. Get game details
            const detailsUrl = `https://games.roblox.com/v1/games?universeIds=${universeId}`;
            const detailsData = await floodFetch(detailsUrl, index);
            
            if (!detailsData || !detailsData.data || !detailsData.data[0]) {
                throw new Error('Failed to get game details');
            }
            const details = detailsData.data[0];
            
            if (statusDiv) {
                statusDiv.innerHTML = `🔄 Game ${index + 1}: Fetching icon...`;
            }
            
            // 3. Get icon URL
            const iconUrl_full = `https://thumbnails.roblox.com/v1/games/icons?universeIds=${universeId}&size=256x256&format=Png&isCircular=false`;
            const iconData = await floodFetch(iconUrl_full, index);
            
            // 4. Get thumbnail gallery
            if (statusDiv) {
                statusDiv.innerHTML = `🔄 Game ${index + 1}: Fetching thumbnails...`;
            }
            
            const thumbUrl = `https://thumbnails.roblox.com/v1/games/multiget/thumbnails?universeIds=${universeId}&countPerUniverse=8&size=768x432&format=Png&isCircular=false`;
            const thumbnailData = await floodFetch(thumbUrl, index);
            
            // Extract icon URL
            let iconUrl = '';
            if (iconData && iconData.data && iconData.data[0] && iconData.data[0].imageUrl) {
                iconUrl = iconData.data[0].imageUrl;
            }
            
            // Extract thumbnail URLs
            let thumbnails = [];
            if (thumbnailData && thumbnailData.data && thumbnailData.data[0] && thumbnailData.data[0].thumbnails) {
                thumbnails = thumbnailData.data[0].thumbnails.map(t => t.imageUrl);
            }
            
            // Create enriched game object
            const enrichedGame = {
                ...game,
                universeId,
                name: details.name || 'Unknown',
                playerCount: details.playing || 0,
                created: details.created ? new Date(details.created).toLocaleDateString() : '?',
                updated: details.updated ? new Date(details.updated).toLocaleDateString() : '?',
                ownerName: details.creator ? details.creator.name : '?',
                ownerUrl: details.creator ? (details.creator.type === 'Group' 
                    ? `https://www.roblox.com/groups/${details.creator.id}`
                    : `https://www.roblox.com/users/${details.creator.id}/profile`) : '#',
                thumbnailUrl: iconUrl,
                thumbnails: thumbnails,
                gameUrl: `https://www.roblox.com/games/${placeId}`
            };
            
            gamesArray[index] = enrichedGame;
            
            console.log(`✅ Game ${index + 1} loaded: ${details.name || placeId}`);
            
        } catch (err) {
            console.error(`❌ Game ${index + 1} failed after ${MAX_WAVES} waves:`, game, err);
            gamesArray[index] = {
                ...game,
                name: 'Failed to load',
                playerCount: '?',
                created: '?',
                updated: '?',
                ownerName: '?',
                thumbnailUrl: '',
                thumbnails: [],
                gameUrl: game.gameLink || '#'
            };
        }
        
        // After each game, re-render
        const validGames = gamesArray.filter(g => g);
        renderGames(validGames);
        buildTagFilters(validGames);
    }

    // ==================== LOAD GAMES.JSON ====================
    async function loadGames() {
        const grid = document.getElementById('game-grid');
        
        try {
            const response = await fetch('games.json');
            const data = await response.json();
            const GAMES = data.games;
            
            const games = new Array(GAMES.length);
            let hasError = false;
            
            const statusDiv = document.createElement('div');
            statusDiv.className = 'warning';
            statusDiv.innerHTML = `🚀 Loading 0/${GAMES.length} games with flood mode (${PARALLEL_REQUESTS}x per wave, ${MAX_WAVES} waves)`;
            grid.parentNode.insertBefore(statusDiv, grid);
            
            const loadPromises = GAMES.map((game, index) => 
                loadSingleGame(game, games, index, statusDiv)
                    .catch(err => {
                        console.error(`Game ${index + 1} failed:`, err);
                        hasError = true;
                    })
            );
            
            const statusInterval = setInterval(() => {
                const loadedCount = games.filter(g => g).length;
                statusDiv.innerHTML = `🚀 Loading ${loadedCount}/${GAMES.length} games... (flood mode active)`;
                
                if (loadedCount === GAMES.length) {
                    clearInterval(statusInterval);
                    statusDiv.remove();
                    
                    if (hasError) {
                        const warning = document.createElement('div');
                        warning.className = 'warning';
                        warning.innerHTML = '⚠️ Some games failed to load.';
                        grid.parentNode.insertBefore(warning, grid);
                    }
                }
            }, 500);
            
            await Promise.allSettled(loadPromises);
            
        } catch (err) {
            console.error('Failed to load games.json:', err);
            grid.innerHTML = '<div class="error">⚠️ Failed to load games.json</div>';
        }
    }

    // ==================== RENDER GAMES ====================
    function renderGames(games) {
        const grid = document.getElementById('game-grid');
        if (!games.length) {
            grid.innerHTML = '<div class="loading">loading games...</div>';
            return;
        }
        
        let html = '';
        games.forEach((game, index) => {
            const hasSubgames = game.subgames && game.subgames.length > 0;
            
            let tagsHtml = '';
            if (game.tags && game.tags.length > 0) {
                tagsHtml = '<div class="game-tags">';
                game.tags.forEach(tag => {
                    const tagClass = tag === 'OG' ? 'tag og' : 'tag';
                    tagsHtml += `<span class="${tagClass}">${tag}</span>`;
                });
                tagsHtml += '</div>';
            }
            
            let thumbnailsHtml = '';
            if (game.thumbnails && game.thumbnails.length > 0) {
                thumbnailsHtml = '<div class="thumbnail-gallery">';
                game.thumbnails.slice(0, 8).forEach(url => {
                    thumbnailsHtml += `<img src="${url}" alt="screenshot" onerror="this.style.display='none'">`;
                });
                thumbnailsHtml += '</div>';
            }
            
            html += `
                <div class="game-card">
                    <div class="game-thumb">
                        <img src="${game.thumbnailUrl || 'https://placehold.co/120x120/5f9ea0/white?text=Game'}" alt="${game.name}" onerror="this.src='https://placehold.co/120x120/5f9ea0/white?text=No+Icon'">
                    </div>
                    <div class="game-info">
                        <div class="game-title">
                            <a href="${game.gameUrl}">${game.name}</a>
                            ${hasSubgames ? `<button class="expand-btn" onclick="toggleSubgames(${index})">▼ subgames</button>` : ''}
                        </div>
                        ${tagsHtml}
                        <div class="game-stats">
                            <span class="stat-item"><span class="stat-label">players:</span> <span class="stat-value">${game.playerCount}</span></span>
                            <span class="stat-item"><span class="stat-label">created:</span> <span class="stat-value">${game.created}</span></span>
                            <span class="stat-item"><span class="stat-label">updated:</span> <span class="stat-value">${game.updated}</span></span>
                            <span class="stat-item"><span class="stat-label">owner:</span> <span class="stat-value"><a href="${game.ownerUrl}">${game.ownerName}</a></span></span>
                        </div>
                        <div class="maintainer-note">
                            <strong>✎ note:</strong> ${game.maintainerNote}
                        </div>
                        ${thumbnailsHtml}
                        <div id="subgames-${index}" class="subgames">
            `;
            
            if (hasSubgames) {
                game.subgames.forEach(sub => {
                    html += `
                        <div class="subgame-card">
                            <div class="subgame-thumb">
                                <img src="https://placehold.co/80x80/5f9ea0/white?text=Sub" alt="subgame">
                            </div>
                            <div class="subgame-info">
                                <div class="subgame-title"><a href="${sub.gameLink || '#'}">${sub.name || 'Subgame'}</a></div>
                                <div class="subgame-stats">
                                    <span>${sub.note || ''}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            html += `</div></div></div>`;
        });
        
        grid.innerHTML = html;
    }

    // ==================== TAG FILTERS ====================
    let currentGames = [];
    
    function buildTagFilters(games) {
        currentGames = games;
        const tagSet = new Set();
        games.forEach(game => game.tags?.forEach(tag => tagSet.add(tag)));
        
        const filterContainer = document.getElementById('tag-filters');
        filterContainer.innerHTML = '';
        
        Array.from(tagSet).sort().forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-filter-btn';
            btn.textContent = tag;
            btn.onclick = () => filterByTag(tag);
            filterContainer.appendChild(btn);
        });
    }

    function filterByTag(tag) {
        const filtered = currentGames.filter(g => g.tags?.includes(tag));
        renderGames(filtered);
        document.querySelectorAll('.tag-filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === tag);
        });
    }

    document.getElementById('clear-filters').onclick = () => {
        renderGames(currentGames);
        document.querySelectorAll('.tag-filter-btn').forEach(btn => btn.classList.remove('active'));
    };

    window.toggleSubgames = function(index) {
        const div = document.getElementById(`subgames-${index}`);
        const btn = event.target;
        div.classList.toggle('visible');
        btn.textContent = div.classList.contains('visible') ? '▲ subgames' : '▼ subgames';
    };

    // Start
    loadGames();
</script>
</body>
</html>
