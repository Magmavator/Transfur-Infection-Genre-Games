<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMINA · game list</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #e8f0fe;
            color: #1a2b3c;
            line-height: 1.4;
            padding: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* top bar - sharper */
        .topbar {
            background: #1a2b3c;
            color: #e8f0fe;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #5f9ea0;
        }
        .topbar .updated {
            font-size: 13px;
            background: #2c3e50;
            padding: 4px 10px;
            border-radius: 4px;
        }
        .topbar .nav a {
            color: #e8f0fe;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
        }
        .topbar .nav a:hover {
            color: #5f9ea0;
        }
        /* game grid - more compact */
        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .game-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #cbd5e0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .game-thumb {
            flex: 0 0 120px;
        }
        .game-thumb img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .game-info {
            flex: 1;
            min-width: 250px;
        }
        .game-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .game-title a {
            color: #1a2b3c;
            text-decoration: none;
        }
        .game-title a:hover {
            color: #5f9ea0;
        }
        .expand-btn {
            background: none;
            border: 1px solid #5f9ea0;
            color: #5f9ea0;
            font-size: 13px;
            padding: 2px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        .expand-btn:hover {
            background: #5f9ea0;
            color: white;
        }
        /* stats row - compact grid */
        .game-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px 12px;
            background: #f0f7ff;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0 8px;
            font-size: 13px;
            border-left: 3px solid #5f9ea0;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-label {
            color: #4a5b6b;
            font-weight: 500;
        }
        .stat-value {
            font-weight: 600;
            color: #1a2b3c;
        }
        .stat-value a {
            color: #1a2b3c;
            text-decoration: none;
            border-bottom: 1px dotted #9aa9b7;
        }
        .stat-value a:hover {
            color: #5f9ea0;
            border-bottom: 1px solid #5f9ea0;
        }
        .maintainer-note {
            margin-top: 10px;
            padding: 8px 12px;
            background: #f8faff;
            border-left: 3px solid #5f9ea0;
            border-radius: 4px;
            font-size: 13px;
            color: #2c3e50;
        }
        .maintainer-note strong {
            color: #1a2b3c;
            font-weight: 600;
        }
        /* subgames section - collapsible */
        .subgames {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e0;
            display: none;
        }
        .subgames.visible {
            display: block;
        }
        .subgame-card {
            background: #f5faff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #d4e0ec;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .subgame-thumb {
            flex: 0 0 80px;
        }
        .subgame-thumb img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #dbeafe;
            border: 1px solid #b0c4de;
        }
        .subgame-info {
            flex: 1;
        }
        .subgame-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .subgame-title a {
            color: #1a2b3c;
            text-decoration: none;
        }
        .subgame-title a:hover {
            color: #5f9ea0;
        }
        .subgame-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            font-size: 12px;
        }
        @media (max-width: 600px) {
            .game-card {
                flex-direction: column;
            }
            .game-thumb {
                flex: 0 0 auto;
                text-align: center;
            }
            .game-stats {
                grid-template-columns: 1fr 1fr;
            }
            .topbar {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .topbar .nav a {
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="topbar">
        <span class="updated">📅 last updated: <span id="last-updated">loading...</span></span>
        <div class="nav">
            <a href="index.html">home</a>
            <a href="about.html">about</a>
            <a href="contact.html">contact</a>
        </div>
    </div>

    <div id="game-grid" class="game-grid"></div>

</div>

<script>
    // ==================== LOAD JSON ====================
    fetch('games.json')
        .then(response => response.json())
        .then(data => {
            // update last updated
            document.getElementById('last-updated').innerText = data.lastUpdated;

            // render games
            const grid = document.getElementById('game-grid');
            
            data.games.forEach((game, index) => {
                const thumbUrl = `https://thumbnails.roblox.com/v1/games/multiget/thumbnails?universeIds=${game.universeId}&size=768x432&format=Png`;
                const hasSubgames = game.subgames && game.subgames.length > 0;

                const gameCard = document.createElement('div');
                gameCard.className = 'game-card';

                // main game HTML
                let html = `
                    <div class="game-thumb">
                        <img src="${thumbUrl}" alt="${game.name}" onerror="this.src='https://via.placeholder.com/120x120?text=no+image'">
                    </div>
                    <div class="game-info">
                        <div class="game-title">
                            <a href="${game.url}">${game.name}</a>
                            ${hasSubgames ? `<button class="expand-btn" onclick="toggleSubgames(${index})">▼ subgames</button>` : ''}
                        </div>
                        <div class="game-stats">
                            <span class="stat-item"><span class="stat-label">players:</span> <span class="stat-value">${game.players}</span></span>
                            <span class="stat-item"><span class="stat-label">quality:</span> <span class="stat-value">${game.quality}</span></span>
                            <span class="stat-item"><span class="stat-label">created:</span> <span class="stat-value">${game.created}</span></span>
                            <span class="stat-item"><span class="stat-label">last update:</span> <span class="stat-value">${game.lastUpdate}</span></span>
                            <span class="stat-item"><span class="stat-label">owner:</span> <span class="stat-value"><a href="${game.ownerUrl}">${game.ownerName}</a></span></span>
                        </div>
                        <div class="maintainer-note">
                            <strong>✎ note:</strong> ${game.maintainerNote}
                        </div>
                        <div id="subgames-${index}" class="subgames">
                `;

                // add subgames if any
                if (hasSubgames) {
                    game.subgames.forEach(sub => {
                        const subThumb = `https://thumbnails.roblox.com/v1/games/multiget/thumbnails?universeIds=${sub.universeId}&size=768x432&format=Png`;
                        html += `
                            <div class="subgame-card">
                                <div class="subgame-thumb">
                                    <img src="${subThumb}" alt="${sub.name}" onerror="this.src='https://via.placeholder.com/80x80?text=sub'">
                                </div>
                                <div class="subgame-info">
                                    <div class="subgame-title"><a href="${sub.url}">${sub.name}</a></div>
                                    <div class="subgame-stats">
                                        <span><span class="stat-label">players:</span> ${sub.players}</span>
                                        <span><span class="stat-label">quality:</span> ${sub.quality}</span>
                                        <span><span class="stat-label">updated:</span> ${sub.lastUpdate}</span>
                                        <span><span class="stat-label">owner:</span> <a href="${sub.ownerUrl}" style="color:#1a2b3c;">${sub.ownerName}</a></span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                html += `
                        </div>
                    </div>
                `;

                gameCard.innerHTML = html;
                grid.appendChild(gameCard);
            });
        })
        .catch(error => {
            console.error('Failed to load games:', error);
            document.getElementById('game-grid').innerHTML = '<p style="padding: 40px; text-align: center;">⚠️ failed to load games — check console</p>';
        });

    // toggle function for subgames
    window.toggleSubgames = function(index) {
        const subgamesDiv = document.getElementById(`subgames-${index}`);
        const btn = event.target;
        if (subgamesDiv.classList.contains('visible')) {
            subgamesDiv.classList.remove('visible');
            btn.textContent = '▼ subgames';
        } else {
            subgamesDiv.classList.add('visible');
            btn.textContent = '▲ subgames';
        }
    };
</script>

</body>
</html>
